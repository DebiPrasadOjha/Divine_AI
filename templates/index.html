<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Counsel AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at center, #1e1b4b 0%, #090514 100%); color: #f8fafc; }
        .cosmic-title { font-family: 'Cinzel', serif; }
        .god-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .god-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px -5px rgba(234, 179, 8, 0.3); }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake-element { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 relative overflow-x-hidden">

    <div class="max-w-md w-full text-center space-y-8 bg-slate-950/60 p-6 rounded-3xl border border-purple-500/20 backdrop-blur-md relative z-10">
        <h1 class="cosmic-title text-3xl font-black text-amber-400 tracking-widest drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]">✨ COSMIC COUNSEL ✨</h1>
        <p class="text-xs text-slate-400 tracking-wider uppercase">Seek emotional clarity. No equations. No logic. Only divine reality.</p>

        <!-- STEP 1: SELECT DEITY -->
        <div id="step-1" class="space-y-6">
            <h2 class="text-lg font-medium text-slate-200">Whose presence do you summon?</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="selectGod('krishna')" class="god-card w-full p-4 bg-amber-950/30 border border-amber-500/40 rounded-2xl flex items-center justify-between group">
                    <div class="text-left">
                        <span class="block text-xl font-bold text-amber-300">🪈 Lord Krishna</span>
                        <span class="text-xs text-slate-400">Warm, playful, reassuring & jolly advice</span>
                    </div>
                    <span class="text-2xl opacity-60 group-hover:opacity-100">→</span>
                </button>
                <button onclick="selectGod('brahma')" class="god-card w-full p-4 bg-purple-950/30 border border-purple-500/40 rounded-2xl flex items-center justify-between group">
                    <div class="text-left">
                        <span class="block text-xl font-bold text-purple-300">🪷 Lord Brahma</span>
                        <span class="text-xs text-slate-400">Highly objective, stable & deeply mature wisdom</span>
                    </div>
                    <span class="text-2xl opacity-60 group-hover:opacity-100">→</span>
                </button>
                <button onclick="selectGod('shiva')" class="god-card w-full p-4 bg-blue-950/30 border border-blue-500/40 rounded-2xl flex items-center justify-between group">
                    <div class="text-left">
                        <span class="block text-xl font-bold text-blue-300">🔱 Lord Shiva</span>
                        <span class="text-xs text-slate-400 text-red-400 font-semibold">⚠️ Raw, aggressive, unadulterated reality</span>
                    </div>
                    <span class="text-2xl opacity-60 group-hover:opacity-100">→</span>
                </button>
            </div>
        </div>

        <!-- STEP 2: INPUT PROMPT & DISPLAY -->
        <div id="step-2" class="hidden space-y-4">
            <div id="shiva-warning" class="hidden p-3 bg-red-950/40 border border-red-500/50 rounded-xl text-xs text-red-300 font-bold tracking-wide animate-pulse">
                🔥 WARNING: High bluntness levels ahead. Proceed only if you can handle the raw truth.
            </div>
            <h2 id="selected-god-title" class="cosmic-title text-xl font-bold tracking-wide text-slate-200"></h2>
            
            <div id="textarea-container">
                <textarea id="user-prompt" rows="5" class="w-full p-4 rounded-2xl bg-slate-900/90 border border-slate-700/60 focus:outline-none focus:border-amber-400 text-white transition-all text-sm placeholder-slate-500" placeholder="Type your deepest dilemma... (Supports Odia, Hindi, English)"></textarea>
            </div>

            <div class="flex gap-3">
                <button onclick="goBack()" class="w-1/3 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold transition-all text-sm">Back</button>
                <button onclick="getAdvice()" class="w-2/3 bg-amber-500 hover:bg-amber-600 text-slate-950 py-3 rounded-xl font-black shadow-lg shadow-amber-500/20 transition-all text-sm">Seek Counsel</button>
            </div>
        </div>

        <!-- LOADING & RESULTS CONTAINER -->
        <div id="result-box" class="hidden p-5 rounded-2xl bg-slate-900/90 border border-amber-500/30 text-left space-y-4 shadow-xl">
            <p id="output-text" class="text-sm leading-relaxed text-slate-200 whitespace-pre-line"></p>
            <button id="copy-btn" onclick="copyToClipboard()" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-xs font-bold rounded-lg text-amber-400 transition-all">
                📸 Copy for Instagram Story Screenshot
            </button>
        </div>

        <div class="text-[10px] text-slate-600 font-mono tracking-widest pt-2">
            PROPRIETARY ENGINE CORE v2.5 // BY @YOUR_INSTA_HANDLE
        </div>
    </div>

    <script>
        let selectedGod = "";

        function selectGod(god) {
            selectedGod = god;
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('selected-god-title').innerText = `Presenting your heart to Lord ${god}`;
            
            if(god === 'shiva') {
                document.getElementById('shiva-warning').classList.remove('hidden');
            } else {
                document.getElementById('shiva-warning').classList.add('hidden');
            }
        }

        function goBack() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('result-box').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('user-prompt').value = "";
        }

        async function getAdvice() {
            const promptInput = document.getElementById('user-prompt');
            const prompt = promptInput.value;
            const outputBox = document.getElementById('result-box');
            const outputText = document.getElementById('output-text');
            const container = document.getElementById('textarea-container');
            
            if(!prompt.trim()) return alert("Speak your mind first.");

            // Smart Frontend Detection: Instantly catch basic math attempts before calling backend
            if(/[\d+\-*/=]/.test(prompt) && (prompt.includes('+') || prompt.includes('*') || prompt.includes('/') || prompt.includes('-'))) {
                container.classList.add('shake-element');
                setTimeout(() => container.classList.remove('shake-element'), 400);
                outputBox.classList.remove('hidden');
                outputText.innerHTML = `<span class="text-red-400 font-bold">🔱 ERROR: Divine alignment shattered!</span>\n\nDo not bring your math puzzles to the cosmic realm. Solve equations elsewhere; bring only the vulnerabilities of your soul.`;
                return;
            }
            
            outputBox.classList.remove('hidden');
            outputText.innerText = "Aligning celestial energies... listening to the cosmos...";

            try {
                const response = await fetch('/get-advice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ god: selectedGod, prompt: prompt })
                });
                const data = await response.json();
                outputText.innerText = data.advice || data.error;
            } catch (err) {
                outputText.innerText = "The cosmos are busy right now. Synchronizing alignment... Please try again.";
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('output-text').innerText;
            const formattedText = `🌌 Divine Advice from Lord ${selectedGod.toUpperCase()}:\n\n"${text}"\n\n🔮 Try it here: [Your Link] | Created by @YOUR_INSTA_HANDLE`;
            navigator.clipboard.writeText(formattedText);
            const btn = document.getElementById('copy-btn');
            btn.innerText = "Copied! Paste directly to your Insta Story!";
            setTimeout(() => btn.innerText = "Copy for Instagram Story Screenshot", 3000);
        }
    </script>
</body>
</html>
