<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Counsel AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at center, #131131 0%, #05030a 100%); color: #f8fafc; }
        .cosmic-title { font-family: 'Cinzel', serif; }
        .god-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .god-card:hover { transform: translateY(-6px); box-shadow: 0 10px 25px -5px rgba(234, 179, 8, 0.2); }
        .shake-element { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full text-center space-y-8 bg-slate-950/70 p-6 rounded-3xl border border-purple-500/10 backdrop-blur-md">
        <h1 class="cosmic-title text-3xl font-black text-amber-400">🕉 COSMIC COUNSEL 🕉</h1>
        
        <div id="step-1" class="space-y-4">
            <h2 class="text-sm text-slate-300">Whose presence do you summon?</h2>
            <button onclick="selectDeity('krishna')" class="god-card w-full p-4 bg-amber-950/20 border border-amber-500/30 rounded-2xl text-left">
                <span class="block text-lg font-bold text-amber-300">🪈 Lord Krishna</span>
            </button>
            <button onclick="selectDeity('brahma')" class="god-card w-full p-4 bg-purple-950/20 border border-purple-500/30 rounded-2xl text-left">
                <span class="block text-lg font-bold text-purple-300">🪷 Lord Brahma</span>
            </button>
            <button onclick="selectDeity('shiva')" class="god-card w-full p-4 bg-blue-950/20 border border-blue-500/30 rounded-2xl text-left">
                <span class="block text-lg font-bold text-blue-300">🔱 Lord Shiva</span>
            </button>
        </div>

        <div id="step-2" class="hidden space-y-4">
            <h2 id="selected-god-title" class="cosmic-title text-lg text-slate-200"></h2>
            <textarea id="user-prompt" rows="5" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-800 text-white text-sm" placeholder="Type your dilemma..."></textarea>
            <div class="flex gap-3">
                <button onclick="goBack()" class="w-1/3 bg-slate-800 py-3 rounded-xl font-bold text-sm">Back</button>
                <button onclick="getAdvice()" class="w-2/3 bg-amber-500 text-slate-950 py-3 rounded-xl font-black text-sm">Seek Counsel</button>
            </div>
        </div>

        <div id="result-box" class="hidden p-5 rounded-2xl bg-slate-900 border border-slate-800 text-left space-y-4">
            <p id="output-text" class="text-sm text-slate-300 whitespace-pre-line"></p>
            <button id="copy-btn" onclick="copyToClipboard()" class="w-full py-2 bg-slate-800 text-xs font-bold rounded-lg text-amber-400">📸 Copy for Instagram</button>
        </div>

        <!-- FEEDBACK SECTION -->
        <div class="pt-6 border-t border-slate-800">
            <textarea id="user-feedback" rows="2" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-800 text-white text-xs mb-2" placeholder="Feedback for improvement..."></textarea>
            <button onclick="sendFeedback()" id="feedback-btn" class="w-full py-2 bg-slate-800 text-[10px] font-bold rounded-lg text-slate-300">Submit Feedback</button>
        </div>

        <div class="text-[9px] text-slate-700 font-mono pt-2 uppercase">Proprietary Engine // Maintained by @debiprasad.ojha</div>
    </div>

    <script>
        let selectedGod = "";
        function selectDeity(g) { selectedGod = g; document.getElementById('step-1').classList.add('hidden'); document.getElementById('step-2').classList.remove('hidden'); document.getElementById('selected-god-title').innerText = `Presenting to Lord ${g.charAt(0).toUpperCase() + g.slice(1)}`; }
        function goBack() { document.getElementById('step-2').classList.add('hidden'); document.getElementById('result-box').classList.add('hidden'); document.getElementById('step-1').classList.remove('hidden'); }
        
        async function getAdvice() {
            const prompt = document.getElementById('user-prompt').value;
            if(/[\+\*\/=]/.test(prompt)) { alert("No math allowed!"); return; }
            document.getElementById('result-box').classList.remove('hidden');
            const res = await fetch('/get-advice', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ god: selectedGod, prompt }) });
            const data = await res.json();
            document.getElementById('output-text').innerText = data.advice;
        }

        async function sendFeedback() {
            const fb = document.getElementById('user-feedback').value;
            if(!fb.trim()) return;
            await fetch('/submit-feedback', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ feedback: fb }) });
            document.getElementById('feedback-btn').innerText = "Thank you!";
        }

        function copyToClipboard() {
            const text = `Cosmic Counsel from Lord ${selectedGod.toUpperCase()}:\n\n"${document.getElementById('output-text').innerText}"\n\nBuilt by @debiprasad.ojha`;
            navigator.clipboard.writeText(text);
        }
    </script>
</body>
</html>
