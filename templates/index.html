<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Counsel AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-gold: #ff9f43;
            --text-color: #c9d1d9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #ffffff; margin-bottom: 5px; font-weight: 600; }
        .subtitle { font-size: 14px; color: #8b949e; margin-bottom: 25px; }
        
        /* Mystic Sun & Dot Divider (Replaces Gemini Sparkles) */
        .spiritual-divider {
            margin: 15px auto 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--accent-gold);
            font-size: 14px;
            letter-spacing: 2px;
        }
        .spiritual-divider .line {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent-gold), transparent);
        }
        .spiritual-divider .symbol {
            font-weight: bold;
            opacity: 0.9;
        }

        /* Deity Selection Cards */
        .deity-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .deity-card {
            background-color: var(--card-bg);
            border: 2px solid #21262d;
            border-radius: 12px;
            padding: 18px 5px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .deity-card:hover { border-color: #30363d; }
        .deity-card.active {
            border-color: var(--accent-gold);
            background-color: #1f242c;
            transform: scale(1.03);
        }
        .deity-emoji { font-size: 30px; margin-bottom: 5px; }
        .deity-name { font-size: 13px; font-weight: 600; color: #f0f6fc; }

        /* Text Input */
        textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--card-bg);
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 14px;
            color: #ffffff;
            font-size: 15px;
            resize: none;
            margin-bottom: 15px;
            outline: none;
        }
        textarea:focus { border-color: #388bfd; }
        
        button {
            width: 100%;
            background-color: #238636;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #21262d; color: #8b949e; cursor: not-allowed; }

        /* Custom Structured Output Box */
        .output-box {
            margin-top: 25px;
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            display: none;
            line-height: 1.6;
            font-size: 15px;
        }
        .output-box p { margin-top: 0; margin-bottom: 14px; }
        .output-box ul { margin-top: 0; padding-left: 20px; margin-bottom: 14px; }
        .output-box li { margin-bottom: 6px; }
        .output-box strong { color: var(--accent-gold); }
    </style>
</head>
<body>

<div class="container">
    <h1>Divine Counsel</h1>
    <div class="subtitle">Receive timeless perspective on life's complications</div>
    
    <!-- Clean, branded-free spiritual accent element -->
    <div class="spiritual-divider">
        <div class="line"></div>
        <div class="symbol">• ☼ •</div>
        <div class="line"></div>
    </div>

    <!-- Deity Layout Grid -->
    <div class="deity-grid">
        <div class="deity-card" id="card-krishna" onclick="selectDeity('krishna')">
            <div class="deity-emoji">🪈</div>
            <div class="deity-name">Lord Krishna</div>
        </div>
        <div class="deity-card" id="card-brahma" onclick="selectDeity('brahma')">
            <div class="deity-emoji">🷪</div>
            <div class="deity-name">Lord Brahma</div>
        </div>
        <div class="deity-card" id="card-shiva" onclick="selectDeity('shiva')">
            <div class="deity-emoji">🔱</div>
            <div class="deity-name">Lord Shiva</div>
        </div>
    </div>

    <!-- Interface Prompt Canvas -->
    <textarea id="userPrompt" rows="6" placeholder="State your dilemma clearly, ask about your relationship patterns, or input your birth sign for astrological guidance..."></textarea>
    <button id="submitBtn" onclick="seekCounsel()">Seek Counsel</button>

    <!-- Structured Render Output Display -->
    <div class="output-box" id="outputCard"></div>
</div>

<script>
    let selectedGod = '';

    // Audio tracking map for local instrumental cues
    const tracks = {
        'krishna': '/static/flute.mp3',
        'shiva': '/static/dambru.mp3',
        'brahma': '/static/om.mp3'
    };

    function executeTrack(god) {
        if (tracks[god]) {
            let audioObj = new Audio(tracks[god]);
            audioObj.volume = 0.5;
            audioObj.play().catch(err => console.log("Audio trigger blocked until user action occurs."));
        }
    }

    function selectDeity(god) {
        selectedGod = god;
        document.querySelectorAll('.deity-card').forEach(card => card.classList.remove('active'));
        document.getElementById(`card-${god}`).classList.add('active');
        
        // Immediate audio sound on deck click
        executeTrack(god);
    }

    async function seekCounsel() {
        const promptInput = document.getElementById('userPrompt').value.trim();
        const outputCard = document.getElementById('outputCard');
        const submitBtn = document.getElementById('submitBtn');

        if (!selectedGod) {
            alert('Please select a deity card first to establish a divine connection.');
            return;
        }
        if (!promptInput) {
            alert('Please write out your query before seeking counsel.');
            return;
        }

        // Play audio track again right as they submit the question
        executeTrack(selectedGod);

        submitBtn.disabled = true;
        submitBtn.innerText = "Aligning Celestial Paths...";
        outputCard.style.display = "block";
        outputCard.innerHTML = "<em>Reading your stars and ancient logs... Please wait in quiet reflection.</em>";

        try {
            const response = await fetch('/get-advice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    god: selectedGod,
                    prompt: promptInput
                })
            });

            const data = await response.json();
            submitBtn.disabled = false;
            submitBtn.innerText = "Seek Counsel";

            if (data.advice) {
                outputCard.innerHTML = marked.parse(data.advice);
            } else if (data.error) {
                outputCard.innerHTML = `<span style="color: #f85149;">${marked.parse(data.error)}</span>`;
            }
        } catch (error) {
            submitBtn.disabled = false;
            submitBtn.innerText = "Seek Counsel";
            outputCard.innerHTML = "<span style='color: #f85149;'>The line timed out. Re-submit your thoughts.</span>";
        }
    }
</script>

</body>
</html>
